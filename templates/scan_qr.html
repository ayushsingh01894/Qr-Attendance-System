<!doctype html>
<html>
  <head>
    <title>Student Attendance</title>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #3b82f6, #22c55e);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card {
        background: rgba(255, 255, 255, 0.95);
        width: 360px;
        padding: 25px;
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        text-align: center;
        animation: fadeIn 0.4s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        margin-bottom: 15px;
        color: #1f2937;
      }

      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        font-size: 14px;
        outline: none;
        transition: border 0.2s ease;
      }

      input:focus {
        border-color: #3b82f6;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(59, 130, 246, 0.35);
      }

      #reader {
        margin-top: 18px;
        border-radius: 14px;
        overflow: hidden;
      }

      #result {
        margin-top: 15px;
        font-size: 14px;
        font-weight: 600;
        color: #047857;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Student Attendance</h2>

      <input id="roll_no" placeholder="Roll Number" autocomplete="off" />
      <input id="name" placeholder="Student Name" autocomplete="off" />

      <button onclick="startScan()">Scan QR & Submit</button>

      <div id="reader"></div>
      <p id="result"></p>
    </div>

    <script>
      let scanner;

      function startScan() {
        const rollNo = roll_no.value.trim();
        const name = document.getElementById("name").value.trim();

        if (!rollNo || !name) {
          alert("Fill all details");
          return;
        }

        scanner = new Html5Qrcode("reader");
        scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 250 },
          (qr) => {
            scanner.stop();

            fetch("/mark_attendance", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                roll_no: rollNo,
                name: name,
                qr_id: qr,
              }),
            })
              .then((res) => res.json())
              .then((data) => {
                document.getElementById("result").innerText = data.message;
              });
          },
        );
      }
    </script>
  </body>
</html>
